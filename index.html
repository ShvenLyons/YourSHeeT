<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YourSheeT</title>
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>
  <div id="code-bg" class="code-bg" aria-hidden="true"></div>

  <main>
    <header>
      <div class="hero">
        <div>
          <h1 class="brand" aria-label="YourSheeT">
            <span class="brand-main"><span class="brand-ochre">Y</span><span class="brand-rose">o</span><span class="brand-sky">u</span><span class="brand-leaf">r</span></span><span class="brand-sheet"><span class="brand-violet">S</span><span class="brand-ochre">h</span><span class="brand-peach">e</span><span class="brand-sky">e</span><span class="brand-ochre">T</span></span>
          </h1>
          <p class="subhead">时间工作台</p>
        </div>
        <div class="visuals" aria-hidden="true">
          <div class="figure-tile"><img src="figure/membrane-eye.svg" alt=""></div>
          <div class="figure-tile"><img src="figure/sinew-grid.svg" alt=""></div>
          <div class="figure-tile sacred"><img src="figure/golden-halo.svg" alt=""></div>
          <div class="figure-tile"><img src="figure/ivory-rune.svg" alt=""></div>
          <div class="figure-tile"><img src="figure/sacred-warning.svg" alt=""></div>
        </div>
      </div>
    </header>

    <div class="workspace">
      <section aria-labelledby="encrypt-title">
        <div class="panel-head">
          <h2 id="encrypt-title">加密</h2>
        </div>
        <div class="panel-body">
          <div class="row">
            <label>
              Begin
              <input id="begin" value="19:26" inputmode="numeric" autocomplete="off">
            </label>
            <label>
              End
              <input id="end" value="19:30" inputmode="numeric" autocomplete="off">
            </label>
          </div>
          <label class="toggle">
            End 为 N/A
            <input id="no-end" type="checkbox">
          </label>
          <div class="output">
            <span>密文</span>
            <div id="cipher-output" class="result">absd</div>
            <div id="encrypt-status" class="status"></div>
          </div>
          <div class="copy-row">
            <button id="copy-code" type="button">复制密文</button>
            <button id="use-code" class="secondary" type="button">填入解密</button>
          </div>
        </div>
      </section>

      <section aria-labelledby="decrypt-title">
        <div class="panel-head">
          <h2 id="decrypt-title">解密</h2>
        </div>
        <div class="panel-body">
          <label>
            密钥
            <input id="dec-key" type="password" value="" placeholder="请输入密钥" autocomplete="off">
          </label>
          <label>
            密文
            <input id="cipher-input" value="absd" maxlength="4" autocomplete="off">
          </label>
          <div class="row">
            <label>
              Begin
              <input id="decoded-begin" readonly>
            </label>
            <label>
              End
              <input id="decoded-end" readonly>
            </label>
          </div>
          <div class="output">
            <span>明文</span>
            <div id="plain-output" class="result">----</div>
            <div id="decrypt-status" class="status"></div>
          </div>
          <div class="copy-row">
            <button id="copy-plain" type="button">复制明文</button>
          </div>
        </div>
      </section>
    </div>

    <section class="records-panel" aria-labelledby="records-title">
      <div class="panel-head">
        <h2 id="records-title">记录</h2>
      </div>
      <div class="panel-body">
        <div class="records-grid">
          <label>
            日期
            <input id="record-date" value="603" inputmode="numeric" autocomplete="off">
          </label>
          <label>
            密文列表
            <textarea id="record-codes" autocomplete="off" placeholder="absd, gcXj"></textarea>
          </label>
        </div>
        <div class="copy-row">
          <button id="add-current-code" type="button">加入当前密文</button>
          <button id="save-record" type="button">保存记录</button>
          <a class="button-link secondary" href="record.html">查看记录</a>
          <button id="export-records" class="secondary" type="button">导出记录文件</button>
          <button id="clear-record-day" class="secondary" type="button">清空日期</button>
        </div>
        <div id="record-status" class="status"></div>
        <div id="record-list" class="record-list" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <div id="peek-alert" class="peek-alert" aria-hidden="true">
    <div class="peek-card" role="alertdialog" aria-modal="true" aria-labelledby="peek-message">
      <div class="peek-symbol">!</div>
      <p id="peek-message" class="peek-message">Stop peeking at our research progress! It's really disgusting 🤢</p>
      <button id="peek-close" class="peek-close" type="button">OK</button>
    </div>
  </div>

  <script src="js/background.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
