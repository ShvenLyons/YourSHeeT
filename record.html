<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YourSheeT Records</title>
  <link rel="stylesheet" href="css/theme.css">
</head>
<body class="records-page">
  <div id="code-bg" class="code-bg" aria-hidden="true"></div>

  <main>
    <header>
      <div>
        <h1 class="brand" aria-label="YourSheeT Records">
          <span class="brand-main"><span class="brand-ochre brand-large">Y</span><span class="brand-rose">o</span><span class="brand-sky">u</span><span class="brand-leaf brand-small">r</span></span><span class="brand-sheet"><span class="brand-violet">S</span><span class="brand-ochre brand-large">h</span><span class="brand-peach brand-small">e</span><span class="brand-sky brand-small">e</span><span class="brand-ochre brand-large">T</span></span>
        </h1>
        <p class="subhead">记录板</p>
      </div>
      <div class="actions">
        <a class="button-link secondary" href="index.html">返回首页</a>
        <button id="refresh-records" type="button">刷新记录</button>
        <button id="export-records" class="secondary" type="button">导出记录文件</button>
      </div>
    </header>

    <section aria-labelledby="records-title">
      <h2 id="records-title">记录</h2>
      <div id="record-list" class="record-list" aria-live="polite"></div>
      <div id="record-status" class="status"></div>
    </section>
  </main>

  <script src="js/background.js"></script>
  <script src="js/record.js"></script>
</body>
</html>
