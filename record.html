<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YourSheeT Records</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7ff;
      --ink: #202033;
      --muted: #62677d;
      --line: #d7d8e8;
      --panel: rgba(255, 255, 255, 0.94);
      --accent: #d75c7a;
      --accent-dark: #5d4fbd;
      --button-start: #e96f82;
      --button-end: #5c8df0;
      --ochre: #a87512;
      --rose: #d75c7a;
      --sky: #357ec7;
      --leaf: #3f9f72;
      --violet: #7c5bd4;
      --peach: #e9854f;
      --warn: #9b341f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(135deg, rgba(215, 92, 122, 0.13), rgba(255, 212, 92, 0.08) 36%, rgba(92, 141, 240, 0.12)),
        var(--bg);
      color: var(--ink);
    }

    .code-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 212, 92, 0.2), transparent 24%),
        radial-gradient(circle at 86% 28%, rgba(215, 92, 122, 0.18), transparent 30%),
        radial-gradient(circle at 44% 82%, rgba(92, 141, 240, 0.18), transparent 30%),
        linear-gradient(135deg, #f0f5ff 0%, #fff2f4 46%, #f2f8fb 100%);
    }

    .code-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.08)),
        linear-gradient(180deg, rgba(246, 247, 242, 0.02), rgba(246, 247, 242, 0.38));
    }

    .code-stream {
      position: absolute;
      top: -140vh;
      display: grid;
      gap: 8px;
      width: max-content;
      color: rgba(73, 91, 172, 0.42);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
      animation: codeFall linear infinite;
    }

    .code-token {
      display: inline-block;
      transform: rotate(var(--tilt, 0deg));
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }

    .code-token.poop {
      color: rgba(155, 52, 31, 0.55);
      font-size: 24px;
    }

    .code-token.code-shit,
    .code-token.code-poop {
      color: rgba(168, 117, 18, 0.58);
      font-weight: 900;
    }

    .code-token.code-poop {
      font-size: 17px;
      line-height: 0.82;
      white-space: pre;
    }

    @keyframes codeFall {
      from {
        transform: translateY(-12vh);
      }

      to {
        transform: translateY(260vh);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .code-stream {
        animation: none;
        opacity: 0.34;
      }
    }

    main {
      width: min(960px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0;
      position: relative;
      z-index: 2;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      margin: 0;
      font-size: clamp(34px, 7vw, 72px);
      line-height: 0.9;
      letter-spacing: 0;
      font-weight: 850;
    }

    .brand-sheet {
      font-family: "Playfair Display", "Cormorant Garamond", Georgia, "Times New Roman", serif;
      font-weight: 760;
      font-style: italic;
    }

    .brand-ochre {
      color: var(--ochre);
    }

    .brand-rose {
      color: var(--rose);
    }

    .brand-sky {
      color: var(--sky);
    }

    .brand-leaf {
      color: var(--leaf);
    }

    .brand-violet {
      color: var(--violet);
    }

    .brand-peach {
      color: var(--peach);
    }

    .subhead {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button,
    .button-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--button-start), var(--button-end));
      color: white;
      padding: 8px 12px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 18px rgba(92, 141, 240, 0.18);
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
    }

    button:hover,
    .button-link:hover {
      filter: saturate(1.08);
      transform: translateY(-1px);
      box-shadow: 0 12px 24px rgba(215, 92, 122, 0.2);
    }

    button.secondary,
    .button-link.secondary {
      border-color: rgba(93, 79, 189, 0.48);
      background: rgba(255, 255, 255, 0.86);
      color: var(--accent-dark);
      box-shadow: none;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      backdrop-filter: blur(5px);
      box-shadow: 0 20px 58px rgba(32, 47, 39, 0.18);
      padding: 18px;
    }

    .record-list {
      display: grid;
      gap: 10px;
      min-height: 160px;
    }

    .record-row {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(247, 245, 255, 0.9);
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 15px;
    }

    .record-row strong {
      color: var(--accent-dark);
    }

    .record-codes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .record-chip {
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(93, 79, 189, 0.18);
      color: #20233f;
      padding: 5px 9px;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 140px;
      color: var(--muted);
      font-weight: 700;
    }

    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .status.error {
      color: var(--warn);
      font-weight: 700;
    }

    @media (max-width: 720px) {
      main {
        width: min(100vw - 20px, 640px);
        padding: 18px 0;
      }

      header {
        display: grid;
        align-items: start;
      }

      .actions {
        justify-content: flex-start;
      }

      .record-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="code-bg" class="code-bg" aria-hidden="true"></div>

  <main>
    <header>
      <div>
        <h1 class="brand" aria-label="YourSheeT Records">
          <span><span class="brand-ochre">Y</span><span class="brand-rose">o</span><span class="brand-sky">u</span><span class="brand-leaf">r</span></span><span class="brand-sheet"><span class="brand-violet">S</span><span class="brand-ochre">h</span><span class="brand-peach">e</span><span class="brand-sky">e</span><span class="brand-ochre">T</span></span>
        </h1>
        <p class="subhead">记录板</p>
      </div>
      <div class="actions">
        <a class="button-link secondary" href="index.html">返回首页</a>
        <button id="refresh-records" type="button">刷新记录</button>
        <button id="export-records" class="secondary" type="button">导出记录文件</button>
      </div>
    </header>

    <section aria-labelledby="records-title">
      <h2 id="records-title">记录</h2>
      <div id="record-list" class="record-list" aria-live="polite"></div>
      <div id="record-status" class="status"></div>
    </section>
  </main>

  <script>
    const RECORD_STORAGE_KEY = "yoursheet.records.v1";
    const codeBg = document.querySelector("#code-bg");
    const recordList = document.querySelector("#record-list");
    const recordStatus = document.querySelector("#record-status");
    let records = {};

    function setStatus(message, isError = false) {
      recordStatus.textContent = message;
      recordStatus.classList.toggle("error", isError);
    }

    function normalizeDate(value) {
      const text = String(value ?? "").trim();
      if (!text) {
        throw new Error("日期不能为空");
      }

      const calendarMatch = text.match(/(\d{1,2})\D+(\d{1,2})/);
      if (calendarMatch) {
        const month = Number(calendarMatch[1]);
        const day = Number(calendarMatch[2]);
        validateMonthDay(month, day);
        return `${month}${String(day).padStart(2, "0")}`;
      }

      const digits = text.replace(/\D/g, "");
      if (digits.length < 3 || digits.length > 4) {
        throw new Error("日期无效");
      }

      const month = Number(digits.length === 3 ? digits.slice(0, 1) : digits.slice(0, 2));
      const day = Number(digits.length === 3 ? digits.slice(1) : digits.slice(2));
      validateMonthDay(month, day);
      return `${month}${String(day).padStart(2, "0")}`;
    }

    function validateMonthDay(month, day) {
      if (month < 1 || month > 12 || day < 1 || day > 31) {
        throw new Error("日期无效");
      }
    }

    function validCode(value) {
      return /^[a-zA-Z]{4}$/.test(String(value));
    }

    function mergeRecords(...sources) {
      const merged = {};
      for (const source of sources) {
        if (!source || typeof source !== "object") {
          continue;
        }
        for (const [day, values] of Object.entries(source)) {
          if (!Array.isArray(values)) {
            continue;
          }
          let normalizedDay;
          try {
            normalizedDay = normalizeDate(day);
          } catch {
            continue;
          }
          const cleanValues = values.map(String).filter(validCode);
          merged[normalizedDay] = Array.from(new Set([...(merged[normalizedDay] || []), ...cleanValues]));
        }
      }
      return merged;
    }

    function storageGet() {
      try {
        return window.localStorage.getItem(RECORD_STORAGE_KEY);
      } catch {
        return null;
      }
    }

    async function loadRecords() {
      let repoRecords = {};
      try {
        const response = await fetch("records.json", { cache: "no-store" });
        if (response.ok) {
          repoRecords = await response.json();
        }
      } catch {
        repoRecords = {};
      }

      let localRecords = {};
      const stored = storageGet();
      if (stored) {
        try {
          localRecords = JSON.parse(stored);
        } catch {
          localRecords = {};
        }
      }

      records = mergeRecords(repoRecords, localRecords);
      renderRecords();
      setStatus("已加载");
    }

    function renderRecords() {
      recordList.replaceChildren();
      const days = Object.keys(records).sort((a, b) => Number(a) - Number(b));

      if (days.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "暂无记录";
        recordList.append(empty);
        return;
      }

      for (const day of days) {
        const row = document.createElement("div");
        row.className = "record-row";

        const date = document.createElement("strong");
        date.textContent = `${day}:`;

        const codes = document.createElement("div");
        codes.className = "record-codes";
        for (const code of records[day]) {
          const chip = document.createElement("span");
          chip.className = "record-chip";
          chip.textContent = code;
          codes.append(chip);
        }

        row.append(date, codes);
        recordList.append(row);
      }
    }

    function exportRecords() {
      const payload = `${JSON.stringify(records, null, 2)}\n`;
      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "records.json";
      link.click();
      URL.revokeObjectURL(url);
      setStatus("已导出");
    }

    function createCodeBackground() {
      const baseTokens = ["const", "let", "await", "return", "map()", "push()", "fn()", "{}", "[]", "=>", "&&", "||", "if", "else", "while", "true", "false", "null", "void", "new", "class", "try", "catch", "import", "export"];
      const rareTokens = ["💩", "s + h + i + t", "<shit/>", "{shit:true}", "sh_it++", "return 💩", "s.h.i.t()", "/* shit */", "shit.map()"];
      const codePoops = ["  +\n+  +\n + +\n+     +", "  ++\n +  +\n+ ++ +\n ++++", "   +\n  +++\n + + +\n+  +  +", " +++\n+ + +\n +++\n+   +"];

      codeBg.replaceChildren();
      const width = window.innerWidth || 1024;
      const streamCount = width < 720 ? 18 : 34;

      for (let i = 0; i < streamCount; i += 1) {
        const stream = document.createElement("div");
        stream.className = "code-stream";
        stream.style.left = `${(i / streamCount) * 100 + Math.random() * 2.2}%`;
        stream.style.animationDuration = `${18 + Math.random() * 24}s`;
        stream.style.animationDelay = `${Math.random() * -32}s`;
        stream.style.opacity = `${0.6 + Math.random() * 0.32}`;

        const tokenCount = 30 + Math.floor(Math.random() * 18);
        for (let j = 0; j < tokenCount; j += 1) {
          const token = document.createElement("span");
          const roll = Math.random();
          if (roll < 0.025) {
            token.textContent = codePoops[Math.floor(Math.random() * codePoops.length)];
            token.className = "code-token code-poop";
          } else {
            const isRare = roll < 0.1;
            const values = isRare ? rareTokens : baseTokens;
            token.textContent = values[Math.floor(Math.random() * values.length)];
            token.className = `code-token${isRare ? (token.textContent === "💩" || token.textContent.includes("💩") ? " poop" : " code-shit") : ""}`;
          }
          token.style.setProperty("--tilt", `${Math.random() * 8 - 4}deg`);
          stream.append(token);
        }

        codeBg.append(stream);
      }
    }

    let backgroundResizeTimer = 0;
    window.addEventListener("resize", () => {
      window.clearTimeout(backgroundResizeTimer);
      backgroundResizeTimer = window.setTimeout(createCodeBackground, 180);
    });

    document.querySelector("#refresh-records").addEventListener("click", loadRecords);
    document.querySelector("#export-records").addEventListener("click", exportRecords);

    createCodeBackground();
    loadRecords();
  </script>
</body>
</html>
